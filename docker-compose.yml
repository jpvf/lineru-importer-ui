services:
  app:
    build: .
    container_name: aurora-sync-ui
    ports:
      - "${APP_PORT:-8091}:8000"
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - AURORA_API_URL=${AURORA_API_URL:-http://192.168.1.113:8090}
    restart: unless-stopped
